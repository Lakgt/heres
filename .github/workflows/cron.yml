name: Cron Jobs

on:
  schedule:
    # Execute intent crank - every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

env:
  SITE_URL: ${{ secrets.SITE_URL }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}

jobs:
  execute-intent:
    runs-on: ubuntu-latest
    steps:
      - name: Execute intent crank
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/execute-intent" \
            --max-time 55

  reconcile-cre:
    runs-on: ubuntu-latest
    steps:
      - name: Reconcile CRE deliveries
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/reconcile-cre-delivery" \
            --max-time 55
